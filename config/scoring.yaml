scoring:
  enabled: true
  score_min: 0
  score_max: 100

account_risk:
  enabled: true
  score_name: composite_account_risk
  score_version: composite_account_risk_v1
  weights:
    rule_risk_score: 0.35
    graph_risk_score: 0.25
    anomaly_risk_score: 0.25
    customer_risk_score: 0.10
    jurisdiction_risk_score: 0.05
  severity_scores:
    low: 25.0
    medium: 50.0
    high: 75.0
    critical: 100.0
  risk_bands:
    low: 0.0
    medium: 50.0
    high: 75.0
    critical: 90.0
  graph_component_weights:
    pagerank_percentile: 0.25
    degree_percentile: 0.15
    betweenness_percentile: 0.15
    cycle_count_percentile: 0.15
    high_risk_alert_count_percentile: 0.20
    proximity_score: 0.10
  customer_risk_scores:
    low: 20.0
    medium: 50.0
    high: 80.0
    critical: 100.0
    unknown: 50.0
  jurisdiction:
    high_risk_country_score: 100.0
    standard_country_score: 30.0
    unknown_country_score: 50.0
  feature_date: null
  alert_lookback_days: null
  graph_feature_version: null
  graph_build_id: null
  anomaly_model_version: null
  anomaly_model_run_id: null
  include_inactive_accounts: true
  min_component_coverage: 0.50
  artefact_output_dir: reports/model_validation

case_generation:
  enabled: true
  case_version: case_generation_v1
  default_status: New
  grouping:
    group_by_account: true
    group_by_customer: true
    group_by_graph_community: true
    group_by_circular_flow: true
    group_by_common_counterparty: true
    group_by_shared_identifier: false
  thresholds:
    min_alerts_per_case: 1
    max_alerts_per_case: 50
    max_cases_per_account: 5
    max_cases_total: 1000
    lookback_days: null
    min_account_risk_score: 0.0
    include_low_risk_accounts: true
  severity_mapping:
    low: low
    medium: medium
    high: high
    critical: critical
  priority:
    use_account_risk_score: true
    use_max_alert_score: true
    use_alert_count_uplift: true
    alert_count_uplift_per_alert: 1.5
    max_alert_count_uplift: 10.0
  artefact_output_dir: reports/model_validation

case_risk:
  enabled: true
  score_name: composite_case_risk
  score_version: composite_case_risk_v1
  weights:
    alert_risk_score: 0.25
    account_risk_score: 0.25
    graph_risk_score: 0.15
    anomaly_risk_score: 0.15
    typology_diversity_score: 0.10
    evidence_value_score: 0.10
  risk_bands:
    low: 0.0
    medium: 50.0
    high: 75.0
    critical: 90.0
  alert:
    use_max_alert_score: true
    use_mean_alert_score: true
    max_alert_weight: 0.70
    mean_alert_weight: 0.30
    severity_scores:
      low: 25.0
      medium: 50.0
      high: 75.0
      critical: 100.0
  graph:
    pagerank_weight: 0.25
    degree_weight: 0.20
    cycle_weight: 0.20
    community_size_weight: 0.15
    alert_proximity_weight: 0.20
  anomaly:
    use_max_anomaly_score: true
    use_mean_anomaly_score: true
    max_anomaly_weight: 0.75
    mean_anomaly_weight: 0.25
  evidence:
    transaction_value_percentile_weight: 0.50
    evidence_count_percentile_weight: 0.25
    related_account_count_percentile_weight: 0.25
  thresholds:
    min_case_priority_score: 0.0
    min_component_coverage: 0.50
    max_cases_total: 1000
  case_version: null
  account_risk_score_version: null
  graph_feature_version: null
  graph_build_id: null
  anomaly_model_version: null
  anomaly_model_run_id: null
  artefact_output_dir: reports/model_validation

case_evidence:
  enabled: true
  evidence_version: case_evidence_v1
  explanation_version: deterministic_explanation_v1
  include:
    alerts: true
    transactions: true
    risk_drivers: true
    graph_context: true
    account_context: true
    typology_context: true
    chronology: true
  limits:
    max_transactions_per_case: 100
    max_alerts_per_case: 50
    max_related_accounts: 50
    max_graph_paths: 25
    max_reason_codes: 25
    max_explanation_bullets: 12
  transaction_sorting:
    primary: transaction_timestamp
    secondary: amount
    descending_amount: true
  risk_driver_thresholds:
    high_component_score: 75.0
    critical_component_score: 90.0
    high_transaction_value_percentile: 90.0
    high_alert_count: 5
    high_typology_count: 3
  explanation:
    include_case_summary: true
    include_typology_summary: true
    include_risk_driver_summary: true
    include_transaction_summary: true
    include_graph_summary: true
    include_recommended_review_focus: true
  artefact_output_dir: reports/model_validation

case_lifecycle:
  enabled: true
  lifecycle_version: case_lifecycle_v1
  statuses:
    - New
    - In review
    - Escalated
    - Information requested
    - Closed false positive
    - Closed suspicious
    - Archived
  terminal_statuses:
    - Closed false positive
    - Closed suspicious
    - Archived
  allowed_transitions:
    New:
      - In review
      - Escalated
      - Information requested
      - Closed false positive
      - Closed suspicious
      - Archived
    In review:
      - Escalated
      - Information requested
      - Closed false positive
      - Closed suspicious
      - Archived
    Escalated:
      - In review
      - Information requested
      - Closed false positive
      - Closed suspicious
      - Archived
    Information requested:
      - In review
      - Escalated
      - Closed false positive
      - Closed suspicious
      - Archived
    Closed false positive:
      - Archived
    Closed suspicious:
      - Archived
    Archived: []
  decision_types:
    - assign
    - status_change
    - comment
    - escalate
    - request_information
    - close_false_positive
    - close_suspicious
    - archive
    - reopen
  analyst:
    default_analyst_id: local_analyst
    default_queue: AML Review
    require_decision_reason: true
    require_comment_for_closure: true
  artefact_output_dir: reports/model_validation

analyst_labels:
  enabled: true
  label_version: analyst_feedback_v1
  dataset_version: supervised_readiness_v1
  decision_label_mapping:
    Closed suspicious: 1
    Closed false positive: 0
  eligible_terminal_statuses:
    - Closed suspicious
    - Closed false positive
  excluded_statuses:
    - New
    - In review
    - Escalated
    - Information requested
    - Archived
  label_quality:
    require_closure_reason: true
    require_comment_for_closure: true
    min_case_labels: 1
    min_positive_labels: 0
    min_negative_labels: 0
    allow_single_class_dataset: true
  propagation:
    build_case_labels: true
    build_account_labels: true
    account_label_strategy: max_case_label
    include_related_accounts: true
    include_primary_account: true
  leakage_controls:
    enforce_label_timestamp_after_case_created: true
    enforce_feature_timestamp_before_label: true
    label_timestamp_column: action_timestamp
  artefact_output_dir: reports/model_validation

account_risk_score:
  weights:
    rule_typology_score: 0.35
    graph_risk_score: 0.25
    anomaly_score: 0.25
    customer_risk_score: 0.10
    jurisdiction_risk_score: 0.05

case_risk_score:
  weights:
    rule_typology_score: 0.30
    graph_risk_score: 0.25
    anomaly_score: 0.20
    customer_risk_score: 0.10
    jurisdiction_risk_score: 0.05
    total_value_score: 0.05
    evidence_density_score: 0.05

severity_mapping:
  low:
    min_score: 0
    max_score: 39
  medium:
    min_score: 40
    max_score: 69
  high:
    min_score: 70
    max_score: 89
  critical:
    min_score: 90
    max_score: 100

normalisation:
  method: min_max
  clip_scores: true
  fill_missing_component_score: 0
