name: graph-aml-case-triage

services:
  postgres:
    image: postgres:16
    container_name: graph_aml_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-graph_aml}
      POSTGRES_USER: ${POSTGRES_USER:-graph_aml_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - graph_aml_network

  neo4j:
    image: neo4j:5-community
    container_name: graph_aml_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change_me}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-change_me} 'RETURN 1;'",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - graph_aml_network

  mlflow:
    image: python:3.12-slim
    container_name: graph_aml_mlflow
    restart: unless-stopped
    profiles:
      - mlflow
    working_dir: /mlflow
    command: >
      sh -c "pip install --no-cache-dir mlflow &&
             mlflow server
             --backend-store-uri file:/mlflow/mlruns
             --default-artifact-root /mlflow/artifacts
             --host 0.0.0.0
             --port 5000"
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_runs:/mlflow/mlruns
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - graph_aml_network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  mlflow_runs:
  mlflow_artifacts:

networks:
  graph_aml_network:
    driver: bridge
